<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deezer-Manager</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style type="text/tailwindcss">
    @variant dark (&:where(.dark, .dark *));
  </style>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-100 dark:bg-[#0b0f19] text-slate-900 dark:text-slate-100 font-sans h-screen flex flex-col overflow-hidden transition-colors duration-300">

  <div class="flex-1 flex overflow-hidden p-2 gap-2 h-[calc(100vh-90px)]">
    
    <aside class="hidden md:flex flex-col w-80 bg-white dark:bg-[#121826] rounded-lg p-4 flex-shrink-0 justify-between transition-colors duration-300 shadow-sm border border-slate-200 dark:border-transparent">
      <div class="space-y-3">
        <div id="btn-mis-albumes" class="flex items-center gap-3 p-2 bg-slate-50 dark:bg-[#1f293d]/50 rounded-md border border-slate-200 dark:border-[#8b5cf6]/20 transition-colors duration-300 cursor-pointer hover:bg-slate-100 dark:hover:bg-[#1f293d]">
          <div class="w-12 h-12 bg-gradient-to-br from-purple-600 to-pink-500 dark:from-[#8b5cf6] dark:to-[#ec4899] rounded flex items-center justify-center shadow-sm">
            <i class="fa-solid fa-heart text-white text-lg"></i>
          </div>
          <div class="flex-1 min-w-0">
            <h4 class="text-sm font-semibold text-slate-900 dark:text-white">Mis Álbumes</h4>
            <p class="text-xs text-slate-500 dark:text-slate-400">Colección Guardada</p>
          </div>
        </div>

        <div id="lista-favoritos-sidebar" class="mt-4 space-y-2 max-h-[380px] overflow-y-auto pr-1">
          </div>
      </div>
    </aside>

    <main class="flex-1 bg-white dark:bg-[#121826] rounded-lg p-6 flex flex-col overflow-y-auto relative transition-colors duration-300 shadow-sm border border-slate-200 dark:border-transparent">
      
      <header class="flex items-center justify-center gap-4 mb-6 sticky top-0 bg-white dark:bg-[#121826] py-2 z-10 transition-colors duration-300">

        <div class="flex items-center gap-2">
          <button id="nav-atras" class="w-8 h-8 rounded-full bg-slate-100 dark:bg-[#0b0f19] flex items-center justify-center text-slate-500 dark:text-slate-400 cursor-pointer disabled:opacity-30 btn-historial-atras" disabled>
            <i class="fa-solid fa-chevron-left"></i>
          </button>
          <button id="nav-adelante" class="w-8 h-8 rounded-full bg-slate-100 dark:bg-[#0b0f19] flex items-center justify-center text-slate-500 dark:text-slate-400 cursor-pointer disabled:opacity-30 btn-historial-adelante" disabled>
            <i class="fa-solid fa-chevron-right"></i>
          </button>
        </div>
        
        <div class="flex-1 max-w-2xl relative">
          <i class="fa-solid fa-magnifying-glass absolute left-4 top-3 text-slate-400 dark:text-slate-400"></i>
          <input type="text" id="searchInput" oninput="buscarCanciones()" placeholder="Buscar música, artistas, álbumes..." class="w-full bg-slate-100 dark:bg-[#1f293d] text-slate-900 dark:text-slate-200 pl-10 pr-4 py-2 rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-purple-600 dark:focus:ring-[#8b5cf6] placeholder-slate-400 dark:placeholder-slate-400 transition-colors duration-300 border border-slate-200 dark:border-transparent">
        </div>
        <div class="flex items-center gap-2 bg-slate-100 dark:bg-[#1f293d] px-3 py-1.5 rounded-full border border-slate-200 dark:border-transparent shrink-0">
          <span class="text-xs font-medium text-slate-500 dark:text-slate-400 hidden lg:inline">Filtrar:</span>
          <select id="filtroCalificacion" class="bg-transparent text-xs font-bold text-slate-700 dark:text-slate-200 focus:outline-none cursor-pointer pr-1">
            <option value="todos" class="bg-white dark:bg-[#121826]">⭐ Todas</option>
            <option value="5" class="bg-white dark:bg-[#121826]">⭐ 5 Estrellas</option>
            <option value="4" class="bg-white dark:bg-[#121826]">⭐ 4 o más</option>
            <option value="3" class="bg-white dark:bg-[#121826]">⭐ 3 o más</option>
            <option value="1" class="bg-white dark:bg-[#121826]">⭐ Con calificación</option>
            <option value="0" class="bg-white dark:bg-[#121826]">❌ Sin calificar</option>
          </select>
        </div>

        <a href="login.html" 
          class="flex items-center gap-2 bg-slate-100 dark:bg-[#1f293d] hover:bg-red-50 dark:hover:bg-red-950/30 text-slate-700 dark:text-slate-300 hover:text-red-600 dark:hover:text-red-400 px-3 py-2 rounded-full text-xs font-bold transition-all duration-200 border border-slate-200 dark:border-transparent cursor-pointer group shrink-0 shadow-sm">
          <i class="fa-solid fa-right-from-bracket transition-transform group-hover:translate-x-0.5"></i>
          <span class="hidden sm:inline" onclick="cerrarSesion()">Cerrar sesión</span>
        </a>
      </header>

      <div>
        <h2 class="text-xl font-bold mb-4 text-slate-900 dark:text-white">Recomendado para ti</h2>
        <div id="contenedor-canciones"class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4"></div>
      </div>
    </main>

    <aside id="panel-derecho" class="hidden flex-col w-72 bg-white dark:bg-[#121826] rounded-lg p-4 flex-shrink-0 overflow-y-auto transition-colors duration-300 shadow-sm border border-slate-200 dark:border-transparent">
  
      <div class="flex items-center justify-between mb-4 shrink-0">
        <h3 id="panelRightTitle" class="font-bold text-sm text-slate-800 dark:text-white">Detalle</h3>
        <button id="closePanelRight" class="w-7 h-7 rounded-full flex items-center justify-center text-slate-400 hover:text-slate-600 dark:hover:text-white hover:bg-slate-100 dark:hover:bg-[#1f293d] transition-colors duration-200 cursor-pointer">
          <i class="fa-solid fa-xmark text-sm"></i>
        </button>
      </div>
      
      <div class="relative rounded-lg overflow-hidden mb-4 shadow-md aspect-[3/4] bg-slate-100 dark:bg-[#1a2333] transition-colors duration-300 flex-shrink-0">
        <div id="detailImgContainer" class="absolute inset-0"></div>
      </div>

      <div class="flex flex-col gap-2 w-full">
        <h2 id="detailTitle" class="text-lg font-bold text-slate-900 dark:text-white break-words leading-tight">Selecciona un elemento</h2>
        <p id="detailArtist" class="text-slate-500 dark:text-slate-400 text-xs font-semibold"></p>
        
        <div id="extraArtistInfo" class="hidden border-t border-slate-200 dark:border-slate-800 pt-3 mt-1 space-y-2 text-xs text-slate-600 dark:text-slate-300 font-medium">
          <div id="extraInfoText" class="flex flex-col gap-2"></div>
        </div>
      </div>
    </aside>
  </div>

  <footer class="h-[90px] bg-white dark:bg-black border-t border-slate-200 dark:border-[#121826] px-4 flex items-center justify-between z-20 transition-colors duration-300 shadow-lg">
    <div class="flex items-center gap-3 w-1/4 min-w-[180px]">
      <div class="min-w-0">
        <h4 id="playerTitle" class="text-sm font-semibold text-slate-900 dark:text-white truncate">Selecciona una canción</h4>
        <p id="playerArtist" class="text-xs text-slate-500 dark:text-slate-400 truncate"></p>
      </div>
    </div>

    <div class="flex items-center gap-3 w-2/4 max-w-xl justify-center">
      <button id="masterPlay" class="w-9 h-9 rounded-full bg-slate-900 dark:bg-white text-white dark:text-black flex items-center justify-center text-sm font-bold hover:scale-105 transition-all cursor-pointer shrink-0 shadow-sm">
        <i class="fa-solid fa-play ml-0.5"></i>
      </button>

      <div class="w-full flex items-center gap-2 text-[11px] text-slate-500 dark:text-slate-400 font-medium">
        <span id="tiempoActual">0:00</span>
        <input type="range" id="playerProgress" value="0" min="0" max="100" 
               class="flex-1 h-1 bg-slate-200 dark:bg-[#2d3a54] rounded-full appearance-none cursor-pointer accent-purple-600 dark:accent-[#8b5cf6] outline-none">
        <span id="tiempoTotal">0:00</span>
      </div>
    </div>
    
    <div class="w-1/4"></div>
  </footer>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
